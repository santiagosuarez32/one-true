    - img "¿Verdad o Mentira? Todo lo que debes saber antes de contratar una prueba de Polígrafo" [ref=e53]
    - article [ref=e55]:
      - generic [ref=e56]:
        - generic [ref=e59]: Blog
        - heading "¿Verdad o Mentira? Todo lo que debes saber antes de contratar una prueba de Polígrafo." [level=1] [ref=e60]
        - generic [ref=e61]:
          - generic [ref=e62]: Publicado el 15 de Noviembre, 2024
          - generic [ref=e63]: •
          - generic [ref=e64]: 5 min de lectura
      - generic [ref=e65]:
        - heading "Introducción" [level=2] [ref=e66]
        - paragraph [ref=e67]: "Tomar la decisión de evaluar la confianza de tu personal o investigar un incidente delicado (como un robo o fraude interno) no es fácil. Seguramente has escuchado hablar del polígrafo o detector de mentiras, pero es normal que surjan dudas: ¿Realmente funciona? ¿Es legal? ¿Qué tan complicado es?"
        - paragraph [ref=e68]: En mi experiencia ayudando a empresas a seleccionar candidatos confiables, he notado que la falta de información clara es el principal obstáculo. Por eso, he recopilado las preguntas más habituales que recibo sobre la poligrafía y las he respondido de forma sencilla. El objetivo es que tengas toda la información sobre la mesa para tomar una decisión objetiva y segura para tu empresa.
        - paragraph [ref=e69]: Las pruebas de polígrafo son una herramienta forense ampliamente utilizada en procesos de selección, investigaciones internas y evaluaciones de confiabilidad. Sin embargo, existen muchos mitos y malinterpretaciones sobre cómo funcionan y qué tan precisas son. En este artículo, te ayudaremos a separar la verdad de la ficción.
        - heading "Lo que necesitas saber sobre las pruebas de polígrafo (Preguntas Frecuentes)" [level=2] [ref=e70]
        - heading "1. ¿Qué tan confiable es realmente el polígrafo o también llamado \"detector de mentiras\"?" [level=3] [ref=e71]
        - paragraph [ref=e72]: Esta es la duda número uno. A diferencia de lo que se ve en las películas, el polígrafo es un instrumento científico, no mágico. Estudios internacionales han demostrado que, cuando la prueba es realizada por un profesional certificado, la precisión de los resultados supera el 90%. Actualmente, es la tecnología más precisa para evaluar la credibilidad de una persona, superando a otras herramientas de evaluación de credibilidad.
        - heading "2. ¿Cómo funciona una prueba de polígrafo? ¿Es solo conectar cables?" [level=3] [ref=e73]
        - paragraph [ref=e74]: "No, es un proceso mucho más completo y humano. Una prueba de Polígrafo profesional consta de tres etapas claras:"
        - list [ref=e75]:
          - listitem [ref=e76]:
            - strong [ref=e77]: "La entrevista previa (Pre-test):"
            - text: Conversamos con la persona para entender su contexto y explicarle el procedimiento.
          - listitem [ref=e78]:
            - strong [ref=e79]: "La fase de prueba (In-test):"
            - text: Aquí es donde se usa el polígrafo para registrar las reacciones psicofisiológicas del cuerpo mientras se hacen las preguntas.
          - listitem [ref=e80]:
            - strong [ref=e81]: "El análisis:"
            - text: Interpretamos esos datos para entregarte un resultado objetivo.
        - heading "3. ¿Cuánto tiempo tarda todo el proceso?" [level=3] [ref=e82]
        - paragraph [ref=e83]: Para garantizar un resultado de calidad, no podemos apresurarnos. Una prueba de polígrafo bien hecha dura normalmente entre 90 y 120 minutos según estándares internacionales. Este tiempo es necesario para que la persona evaluada esté tranquila y el procedimiento se haga correctamente.
        - heading "4. ¿Qué se necesita para hacerle la prueba a un empleado o candidato?" [level=3] [ref=e84]
        - paragraph [ref=e85]: El requisito más importante es el consentimiento. La poligrafía es un proceso voluntario; la persona debe firmar una autorización escrita aceptando someterse a la evaluación. No se puede obligar a nadie, ya que la cooperación es clave para el éxito de la prueba, nosotros nos encargamos de todo.
        - heading "5. ¿Puedo hacer todas las preguntas que quiera?" [level=3] [ref=e86]
        - paragraph [ref=e87]: Muchas veces los clientes quieren aprovechar para preguntar de todo, pero para que la prueba de polígrafo sea efectiva, debemos enfocarnos. Aunque en la entrevista previa se tocan muchos temas, durante la prueba instrumental (con el equipo conectado) nos centramos generalmente en 3 o 4 preguntas clave relacionadas directamente con el objetivo (ej. "¿Robaste el dinero de la caja?", "¿Has cometido fraude en tu empleo anterior?"). Esto garantiza mayor precisión.
        - heading "6. ¿Tengo que llevar a mi personal a sus oficinas o pueden venir a mi empresa?" [level=3] [ref=e88]
        - paragraph [ref=e89]: Sabemos que la logística a veces es complicada. Por eso, las pruebas de polígrafo pueden realizarse en tus instalaciones si así lo prefieres. Solo necesitamos un espacio privado, libre de distracciones, con un escritorio y dos sillas. Nosotros nos encargamos del resto.
        - heading "7. ¿Cuánto tardan en entregarme los resultados?" [level=3] [ref=e90]
        - paragraph [ref=e91]: Entendemos que en situaciones de robos o contratación, el tiempo es dinero. Por lo general, entregamos los resultados en tan solo 4 horas después de haber concluido las pruebas y los informes técnicos en 24 horas.
        - 'heading "Conclusión: La tranquilidad de decidir con la verdad" [level=2] [ref=e92]'
        - paragraph [ref=e93]: Contratar un servicio de poligrafía no se trata solo de "atrapar a alguien", sino de crear un ambiente de trabajo seguro y honesto. Ya sea que necesites filtrar a un nuevo candidato o resolver un incidente interno, ahora sabes cómo funciona esta herramienta.
        - paragraph [ref=e94]: Si tienes más dudas o necesitas asesoría sobre qué tipo de prueba es la ideal para tu caso, no dudes en contactarnos. Estamos aquí para ayudarte a descubrir la verdad.
