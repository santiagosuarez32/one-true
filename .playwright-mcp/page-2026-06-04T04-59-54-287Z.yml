    - generic [ref=e52]:
      - img "One True Prueba de Honestidad, Ética y Valores Laborales"
      - generic [ref=e54]:
        - generic [ref=e57]: Evalúa la Integridad Colectiva y Mitiga el Riesgo Interno en tu Organización.
        - heading "Prueba de Honestidad, Ética y Valores" [level=1] [ref=e58]:
          - text: Prueba de
          - strong [ref=e59]: Honestidad, Ética y Valores
        - paragraph [ref=e60]:
          - text: Un entorno empresarial seguro se construye con personas confiables. Nuestra Prueba de Honestidad, Ética y Valores es una herramienta psicométrica avanzada, compuesta por 90 reactivos estratégicos, diseñada para identificar conductas de riesgo y medir la alineación ética de los evaluados de manera ágil y precisa.
          - text: Esta evaluación no pretende emitir juicios absolutos, sino proporcionar un indicador científico y objetivo que sirve como un pilar de referencia clave. Al integrarla con tus procesos actuales como entrevistas especializadas y verificación de antecedentes, optimizas la toma de decisiones críticas en el capital humano.
        - link "Cotizar mi evaluación ahora" [ref=e62] [cursor=pointer]:
          - /url: "#contacto"
    - generic [ref=e65]:
      - generic [ref=e67]:
        - generic [ref=e70]: Conoce nuestra evaluación
        - heading "Soluciones desarrolladas para mitigar el riesgo interno en tu organización" [level=2] [ref=e71]
        - paragraph [ref=e72]: Nuestra prueba analiza de manera integral la orientación conductual y los valores de los evaluados a través de dimensiones críticas estructuradas en tres grandes ejes de riesgo corporativo.
      - generic [ref=e73]:
        - generic [ref=e74]:
          - img [ref=e76]
          - generic [ref=e78]:
            - heading "Factores de Integridad y Ética Laboral" [level=3] [ref=e79]
            - generic [ref=e80]:
              - paragraph [ref=e81]:
                - strong [ref=e82]: "Honestidad:"
                - text: Mide la inclinación natural del evaluado a actuar con transparencia y rectitud. Permite predecir la probabilidad de conductas deshonestas en comparación con perfiles de alta integridad.
              - paragraph [ref=e83]:
                - strong [ref=e84]: "Moralidad:"
                - text: Evalúa la solidez y firmeza de los valores morales individuales frente a presiones externas, identificando si el perfil es altamente manipulable o propenso a quebrantar sus principios.
              - paragraph [ref=e85]:
                - strong [ref=e86]: "Honestidad al Responder (Control de Deseabilidad Social):"
                - text: Detecta la consistencia y veracidad de la prueba, identificando si el evaluado intenta manipular el test o simular un perfil "socialmente aceptable" para ocultar su verdadera conducta.
        - generic [ref=e87]:
          - img [ref=e89]
          - generic [ref=e98]:
            - heading "Identificación de Comportamientos Riesgosos" [level=3] [ref=e99]
            - generic [ref=e100]:
              - paragraph [ref=e101]:
                - strong [ref=e102]: "Propensión al Robo:"
                - text: Analiza los indicadores actitudinales que se correlacionan directamente con un mayor riesgo estadístico de cometer robos o apropiación ilícita de recursos.
              - paragraph [ref=e103]:
                - strong [ref=e104]: "Tendencia al Abuso o Manipulación:"
                - text: Identifica perfiles con rasgos impulsivos o bajo autocontrol que podrían usar la manipulación para fines personales, afectando el clima laboral o el trato al equipo.
              - paragraph [ref=e105]:
                - strong [ref=e106]: "Riesgo de Daño y Sabotaje:"
                - text: Mide la capacidad de autorregulación emocional ante la frustración o la rabia, previniendo reacciones negativas que pongan en peligro los activos tangibles o el entorno de la empresa.
              - paragraph [ref=e107]:
                - strong [ref=e108]: "Conductas de Descuido:"
                - text: Evalúa el nivel de rigurosidad y atención al detalle, detectando la tendencia a normalizar errores o priorizar la velocidad por encima de los estándares de calidad requeridos.
        - generic [ref=e109]:
          - img [ref=e111]
          - generic [ref=e113]:
            - heading "Alineación y Cultura Organizacional" [level=3] [ref=e114]
            - generic [ref=e115]:
              - paragraph [ref=e116]:
                - strong [ref=e117]: "Apego a las Reglas:"
                - text: Determina el respeto y la importancia que el evaluado otorga a las normas internas, diferenciando a quienes las consideran directrices obligatorias de aquellos que las ven como simples sugerencias opcionales.
              - paragraph [ref=e118]:
                - strong [ref=e119]: "Equidad y Justicia:"
                - text: Mide la disposición a actuar de manera imparcial y equitativa con los demás, identificando riesgos de sesgos corporativos, prejuicios o tratos de conveniencia.
              - paragraph [ref=e120]:
                - strong [ref=e121]: "Trabajo en Equipo:"
                - text: Mide el nivel de adaptabilidad y alineación con los objetivos colectivos, priorizando el éxito del equipo por encima de las metas netamente individuales.
              - paragraph [ref=e122]:
                - strong [ref=e123]: "Interés por el Trabajo (Compromiso Organizacional):"
                - text: Evalúa el valor que la persona le otorga al esfuerzo laboral y su nivel de enfoque para alcanzar las metas estratégicas de la empresa.
              - paragraph [ref=e124]:
                - strong [ref=e125]: "Interés Egocéntrico:"
                - text: Identifica el grado de focalización exclusiva en el beneficio propio, determinando si esta tendencia puede llegar a desmedro o perjuicio de sus compañeros o de la organización.
